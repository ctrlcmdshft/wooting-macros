name: publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.1.1-beta)'
        required: true

jobs:
  publish-tauri:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: yarn install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseBody: |
            ## Installation
            Download and run the `.exe` installer below.

            > **Windows SmartScreen warning**: This release is unsigned. If Windows shows a SmartScreen warning, click **"More info"** then **"Run anyway"** to proceed. This is expected for unsigned builds.
          releaseDraft: true
          prerelease: true
